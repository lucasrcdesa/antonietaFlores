spring.application.name=backend
whatsapp.token=${WHATSAPP_TOKEN}
whatsapp.phone-number-id=${WHATSAPP_PHONE_ID}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.graph-api-version=${WHATSAPP_GRAPH_API_VERSION:v25.0}
whatsapp.site-url=${WHATSAPP_SITE_URL:http://localhost:5173}
whatsapp.catalog-url=${WHATSAPP_CATALOG_URL:http://localhost:5173/produtos}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

produto.images.location=classpath:/static/assets/

api.security.token.secret=${JWT_SECRET}
